
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>AI UGC Auto Video Studio</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI UGC AUTO VIDEO STUDIO</h1>
<p>Upload produk → Auto generate konten → Buat video TikTok.</p>

<div class="container">

<div class="card">

<label>Upload Foto Produk</label>
<input type="file" accept="image/*" id="imageUpload">

<label>Nama Produk</label>
<input id="product" placeholder="Contoh: Kemeja Linen Pria">

<label>Target Market</label>
<input id="target" placeholder="Contoh: pria 20-35 tahun">

<label>Kelebihan Produk</label>
<input id="feature" placeholder="Contoh: adem, premium, jahitan rapi">

<button onclick="generateContent()">AUTO GENERATE CONTENT</button>

</div>

<div class="card">

<h3>Hooks</h3>
<textarea id="hooks"></textarea>

<h3>Script</h3>
<textarea id="script"></textarea>

<h3>Caption</h3>
<textarea id="caption"></textarea>

<button onclick="createVideo()">GENERATE VIDEO</button>

</div>

</div>

<h2>Video Preview</h2>

<canvas id="videoCanvas" width="1080" height="1920"></canvas>

<br><br>

<button onclick="downloadVideo()">Download Video</button>

<script src="app.js"></script>

</body>
</html>
